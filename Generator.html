<!DOCTYPE HTML>
<html>
<style>
body {
	position: relative;
	margin: 0;
	padding: 0;
	overflow: hidden;
	overflow-y: hidden;
}
div {
    position: relative;
    height: 1920px;
	text-align: center;
	user-select: none;
}
span {
	position: relative;
	top: 100px;
	font-size: 80px;
}
</style>
<script>
const letters = "34579ABCDEFHJKMNQRSTWXY";
function p() {
    var str = "";
	for (var i = 0; i < 8; ++i)
		str += letters[Math.floor(Math.random() * letters.length)];
    document.getElementById("span").textContent = str;
	navigator.clipboard.writeText(str);
}
window.addEventListener("load", p);
</script>
<body onclick="p()">
	<div id="div"><span id="span"></span></div>
</body>
</html>
